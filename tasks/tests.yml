---
- name: "Test connection"
  block:
    - name: "Test connection for ansible deploy user: {{ first_contact_deploy_user }}"
      remote_user: "{{ first_contact_deploy_user }}"
      ansible.builtin.wait_for_connection:
        timeout: "{{ first_contact_ssh_connection_timeout }}"

    - name: "Test sudo access for ansible deploy: {{ first_contact_deploy_user }}"
      ansible.builtin.raw: sudo -n id -u
      changed_when: false
      register: deploy_user_sudo_check
      failed_when:
        - deploy_user_sudo_check.rc != 0
        - deploy_user_sudo_check.stdout | trim != "0"

    - name: "Second contact"
      ansible.builtin.include_tasks: second_contact.yml

  rescue:
    - name: "First contact"
      ansible.builtin.include_tasks: first_contact.yml

- name: "Test first_contact_deploy_user is accessible"
  block:
    - name: "Test connection for ansible deploy user: {{ first_contact_deploy_user }}"
      remote_user: "{{ first_contact_deploy_user }}"
      ansible.builtin.wait_for_connection:
        timeout: "{{ first_contact_ssh_connection_timeout }}"

    - name: "Test sudo access for ansible deploy: {{ first_contact_deploy_user }}"
      ansible.builtin.raw: sudo -n id -u
      changed_when: false
      register: deploy_user_sudo_check
      failed_when:
        - deploy_user_sudo_check.rc != 0
        - deploy_user_sudo_check.stdout | trim != "0"

    - name: "Root user"
      ansible.builtin.import_tasks: root_user.yml

  rescue:
    - name: "Fail first_contact_deploy_user accessibility test"
      ansible.builtin.fail:
        msg: "first_contact_deploy_user is not accessible or lacks required privileges: {{ first_contact_deploy_user }}"
