---
- name: "Verify"
  hosts: all
  gather_facts: false
  vars:
    first_contact_ssh_connection_timeout: 3
  tasks:
    - name: "Check if connection still works"
      ansible.builtin.ping:

    - name: "Set fallback first_contact_deploy_user to controller user"
      become: false
      ansible.builtin.command: whoami
      register: whoami
      changed_when: false
      delegate_to: localhost
      when:
        - (first_contact_deploy_user | default('')) == ''
        - ansible_user is not defined
        - ansible_ssh_user is not defined

    - name: "Set first_contact_deploy_user fact"
      ansible.builtin.set_fact:
        first_contact_deploy_user: "{{ ansible_user | default(ansible_ssh_user | default(whoami.stdout)) }}"
      when:
        - (first_contact_deploy_user | default('')) == ''
        - ansible_user is defined or ansible_ssh_user is defined or (whoami is defined and whoami.stdout is defined)

    - name: "Display first_contact_deploy_user"
      ansible.builtin.debug:
        msg: "first_contact_deploy_user: {{ first_contact_deploy_user }}"

    - name: "Test connection for ansible deploy user: {{ first_contact_deploy_user }}"
      remote_user: "{{ first_contact_deploy_user }}"
      ansible.builtin.wait_for_connection:
        timeout: "{{ first_contact_ssh_connection_timeout }}"

    - name: "Test sudo access for ansible deploy: {{ first_contact_deploy_user }}"
      become: true
      ansible.builtin.raw: sudo --version
      changed_when: false

    - name: "Test connection for root user"
      remote_user: "root"
      ansible.builtin.wait_for_connection:
        timeout: "{{ first_contact_ssh_connection_timeout }}"
