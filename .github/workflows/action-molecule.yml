name: Ansible Molecule

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "master"
  schedule:
    - cron: "16 0 * * 0"

permissions:
  contents: read

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install test dependencies
        run: pip3 install --break-system-packages yamllint

      - name: Run Yamllint
        run: |
          yamllint .

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26
        if: ${{ !env.ACT }}

  molecule:
    name: Molecule
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - amazonlinux2023
          - debian11
          - debian12
          - debian13
          - opensuseleap15
          - rockylinux8
          - rockylinux9
          - rockylinux10
          - ubuntu2204
          - ubuntu2404
          - ubuntu2604
        ansible_core_version:
          - 2.16
          - latest
        exclude:
          - distro: rockylinux8
            ansible_core_version: latest
          - distro: opensuseleap15
            ansible_core_version: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install test dependencies (specific version)
        run: pip3 install --break-system-packages ansible-core==${{ matrix.ansible_core_version }} molecule-plugins[docker] jmespath passlib
        if: matrix.ansible_core_version != 'latest'

      - name: Install test dependencies (latest version)
        run: pip3 install --break-system-packages ansible-core molecule-plugins[docker] jmespath passlib
        if: matrix.ansible_core_version == 'latest'

      - name: Secrets to env
        uses: oNaiPs/secrets-to-env-action@v1.8
        with:
          secrets: "${{ toJSON(secrets) }}"

      - name: Run Molecule default scenario
        run: molecule test -s default
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_IMAGE: "${{ matrix.distro }}"

      - name: Run Molecule root-lockdown scenario
        run: molecule test -s root-lockdown
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_IMAGE: "${{ matrix.distro }}"

      - name: Run Molecule Ubuntu fallback scenario
        if: matrix.distro == 'ubuntu2404' || matrix.distro == 'ubuntu2604'
        run: molecule test -s ubuntu-fallback
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_IMAGE: "${{ matrix.distro }}"
