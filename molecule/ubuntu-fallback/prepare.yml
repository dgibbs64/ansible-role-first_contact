---
- name: "Prepare"
  hosts: all
  gather_facts: true

  tasks:
    - name: "Install SSH (apt)"
      become: true
      ansible.builtin.apt:
        name: "openssh-client,openssh-server,sudo,python3-passlib"
        state: present
        update_cache: true
      when: ansible_facts.pkg_mgr == "apt"

    - name: "Create .ssh directory"
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh"
        state: directory
        mode: "0700"

    - name: "Create known_hosts"
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
        state: touch
        mode: "0600"

    - name: "Generate ed25519 key"
      delegate_to: localhost
      community.crypto.openssh_keypair:
        path: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
        type: ed25519
        size: 4096

    - name: "Check whether ubuntu fallback user exists before test setup"
      become: true
      ansible.builtin.command: getent passwd ubuntu
      register: ubuntu_user_preexisting
      changed_when: false
      failed_when: false

    - name: "Display whether ubuntu user pre-existed"
      ansible.builtin.debug:
        msg: "ubuntu user preexisting: {{ ubuntu_user_preexisting.rc == 0 }}"

    - name: "Ensure ubuntu fallback user exists"
      become: true
      ansible.builtin.user:
        name: ubuntu
        shell: /bin/bash
        create_home: true
        state: present

    - name: "Ensure ubuntu fallback user has passwordless sudo"
      become: true
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ubuntu
        content: "ubuntu ALL=(ALL) NOPASSWD: ALL\n"
        mode: "0440"
        owner: root
        group: root
        validate: "visudo -cf %s"

    - name: "Ensure SSH key is present for ubuntu fallback user"
      become: true
      ansible.posix.authorized_key:
        user: ubuntu
        state: present
        key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

    - name: "Ensure /run/sshd exists"
      become: true
      ansible.builtin.file:
        path: "/run/sshd"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Disable root SSH login to force fallback path"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
        validate: "sshd -t -f %s"

    - name: "Start ssh.socket on Ubuntu 24.04"
      become: true
      ansible.builtin.service:
        name: ssh.socket
        state: started
        enabled: true

    - name: "Start sshd service"
      become: true
      ansible.builtin.service:
        name: sshd
        state: started
        enabled: true
      failed_when: false

    - name: "Restart ssh service if available"
      become: true
      ansible.builtin.service:
        name: ssh
        state: restarted
      failed_when: false
